name: CI

on:
  pull_request:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
      NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_STRIPE_PRICE_AI_SINGLE: price_placeholder
      NEXT_PUBLIC_STRIPE_PRICE_WEB_APP: price_placeholder
      NEXT_PUBLIC_SITE_URL: https://ai.affordablepentesting.com

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests
