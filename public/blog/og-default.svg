<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a141f"/>
      <stop offset="0.55" stop-color="#0d2030"/>
      <stop offset="1" stop-color="#0a141f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle green glow band -->
  <rect x="760" y="0" width="440" height="630" fill="#34D399" opacity="0.07"/>

  <!-- accent bar -->
  <rect x="90" y="250" width="64" height="6" rx="3" fill="url(#accent)"/>

  <text x="92" y="225" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" letter-spacing="1" fill="#34D399">AFFORDABLE PENTESTING</text>
  <text x="88" y="345" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="#ffffff">Security Insights</text>
  <text x="92" y="405" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#9fb4bb">Penetration testing guides, costs &amp; compliance</text>

  <!-- decorative four-square motif (on the green band) -->
  <g>
    <rect x="945" y="250" width="84" height="84" rx="18" fill="#0a141f"/>
    <rect x="1049" y="250" width="84" height="84" rx="18" fill="#0d2030"/>
    <rect x="945" y="354" width="84" height="84" rx="18" fill="#0d2030"/>
    <rect x="1049" y="354" width="84" height="84" rx="18" fill="#0a141f"/>
  </g>
</svg>
